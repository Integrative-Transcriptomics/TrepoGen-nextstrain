export:
  title: "Global phylogenomics of Treponema pallidum"
  maintainers: "'Simon Hackl, Nicole Lieberman, Jeffrey Furlong'"
  build_url: "https://github.com/Integrative-Transcriptomics/TrepoGen-nextstrain"

describe:
  preface: |
    **Syphilis** is a resurging global health threat caused by _Treponema pallidum_ ssp. _pallidum_, with additional disease burden from the closely related subspecies _pertenue_ and _endemicum_, the causative agents of yaws and bejel, respectively.
    By 2025 whole genome sequencing data for more than 3,000 _T. pallidum_ strains were available in the NCBI Sequence Read Archive.
    However, more than 80% of these lack publicly available genome assemblies and, more critically, systematic annotation.
    This severely limits their utility for molecular epidemiology, resistance surveillance, and vaccine development.
    **We aim at democratizing access to _T. pallidum_ genomic diversity data by developing and maintaining unified, community-facing Nextstrain datasets for epidemiological surveillance, comparative evolutionary analysis and facilitated data sharing; with a special emphasis on tracking outer membrane protein (OMP) diversity relevant for vaccine design.**

    ##### Features

    In addition to [Nextstrain's standard features](https://docs.nextstrain.org/en/latest/learn/interpret/index.html), this customized Auspice implementation enables:

    - **In-depth investigation of outer membrane protein (OMP) diversity**:
    The <code>Nucleotide diversity of genome</code> panel is annotated with selected OMP genes.
    Clicking on one of these genes, or selecting it using the controls in the sidebar, switches the view to show the <code>Amino acid diversity</code> of that gene.
    This view is annotated with curated protein topology annotations that provide insight into, for example, the diversity of extracellular loops (ECLs), which are key targets for vaccine design.
    Additionally, an information panel below provides more details on the protein, including links to external resources.
    
    We are eagerly working on providing access to more detailed gene expression, protein diversity and sequence data by integrating access to collaborating projects, and by adding more comprehensive sample annotations regarding upcoming classification schemas and the latest MLSTs.
  postscript: |
